# ============================================
# Whisper Blog API — Local Development Stack
# ============================================
# Usage:
#   docker compose up -d          Start all services
#   docker compose down           Stop all services
#   docker compose down -v        Stop + remove volumes (destroys data)
#   docker compose logs -f api    Follow API logs
# ============================================

services:
  # ── PostgreSQL ─────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: whisper-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-whisper}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-whisper_secret}
      POSTGRES_DB: ${DATABASE_NAME:-whisper_blog_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-whisper}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: whisper-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ───
  minio:
    image: minio/minio:latest
    container_name: whisper-minio
    restart: unless-stopped
    ports:
      - "9000:9000"      # S3 API
      - "9001:9001"      # MinIO Console (Web UI)
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO Bucket Initializer ───────────────
  # Creates the default bucket on first run
  minio-init:
    image: minio/mc:latest
    container_name: whisper-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set whisper http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin123};
      mc mb whisper/$${MINIO_BUCKET_NAME:-whisper-uploads} --ignore-existing;
      mc anonymous set download whisper/$${MINIO_BUCKET_NAME:-whisper-uploads}/public;
      echo 'Bucket ready!';
      exit 0;
      "

  # ── NestJS API (production build) ──────────
  # Uncomment this service when you want to run
  # the API inside Docker (e.g., for E2E tests
  # or production-like testing). During active
  # development, run the API locally with
  # `pnpm run start:dev` instead.
  #
  # api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: whisper-api
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     NODE_ENV: production
  #     PORT: 3000
  #     DATABASE_URL: postgresql://${DATABASE_USERNAME:-whisper}:${DATABASE_PASSWORD:-whisper_secret}@postgres:5432/${DATABASE_NAME:-whisper_blog_dev}?schema=public
  #     JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars!!}
  #     JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-15m}
  #     JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
  #     MINIO_ENDPOINT: minio
  #     MINIO_PORT: 9000
  #     MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  #     MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
  #     MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-whisper-uploads}
  #     MINIO_USE_SSL: "false"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     minio:
  #       condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
